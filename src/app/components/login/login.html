<div class="login-shell">
  <div class="bg-shape shape-one"></div>
  <div class="bg-shape shape-two"></div>

  <section class="login-panel reveal-in">
    <div class="brand-side">
      <p class="tag">Employee Management</p>
      <h1>Welcome Back</h1>
      <p class="lead">Access your dashboard to manage teams, payroll, and daily operations with clarity.</p>

      <div class="mini-cards">
        <div>
          <span>Secure</span>
          <strong>JWT Auth</strong>
        </div>
        <div>
          <span>Fast</span>
          <strong>Live Controls</strong>
        </div>
      </div>
    </div>

    <div class="form-side">
      <h2>Sign In</h2>
      <p>Use your account credentials to continue.</p>

      <form (ngSubmit)="onLogin()" class="login-form">
        <label>
          <span>Email</span>
          <input type="email" [(ngModel)]="email" name="email" placeholder="name@company.com" required />
        </label>

        <label>
          <span>Password</span>
          <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" required />
        </label>

        <button type="submit">Login</button>
      </form>
    </div>
  </section>
</div>
